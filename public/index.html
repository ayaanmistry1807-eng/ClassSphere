<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClassSphere • Your Learning Universe</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:    #00f5ff;
      --violet:  #b44fff;
      --indigo:  #5c6fff;
      --gold:    #ffd166;
      --bg:      #03000d;
      --surface: rgba(255,255,255,0.03);
      --border:  rgba(0,245,255,0.15);
      --glow-c:  rgba(0,245,255,0.55);
      --glow-v:  rgba(180,79,255,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: 'Syne', sans-serif;
      cursor: none;
    }

    /* ─── CUSTOM CURSOR ─── */
    #cursor {
      position: fixed;
      width: 18px; height: 18px;
      border: 2px solid var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .25s, height .25s, background .25s, border-color .25s;
      mix-blend-mode: screen;
    }
    #cursor.grow {
      width: 42px; height: 42px;
      background: rgba(0,245,255,0.12);
      border-color: var(--violet);
    }

    /* ─── CANVAS ─── */
    #space-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ─── NEBULA BLOBS ─── */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: blobPulse 12s ease-in-out infinite;
    }
    .blob-1 {
      width: 600px; height: 500px;
      background: radial-gradient(circle, rgba(92,111,255,0.35), transparent 70%);
      top: -10%; left: -8%;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 700px; height: 600px;
      background: radial-gradient(circle, rgba(180,79,255,0.28), transparent 70%);
      bottom: -15%; right: -10%;
      animation-delay: 4s;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,245,255,0.2), transparent 70%);
      top: 40%; left: 55%;
      animation-delay: 8s;
    }
    @keyframes blobPulse {
      0%,100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 0.9; transform: scale(1.08); }
    }

    /* ─── GRID OVERLAY ─── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* ─── MAIN WRAPPER ─── */
    .scene {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-align: center;
      padding: 20px;
    }

    /* ─── ORBITING LOGO ─── */
    .logo-system {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 2.5rem;
      flex-shrink: 0;
    }

    .orbit-track {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      border: 1px solid rgba(0,245,255,0.18);
      animation: spinOrbit 40s linear infinite;
    }
    .orbit-track::before {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: var(--cyan);
      border-radius: 50%;
      top: -5px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 16px 4px var(--glow-c);
    }

    .orbit-track-2 {
      position: absolute;
      inset: -70px;
      border-radius: 50%;
      border: 1px dashed rgba(180,79,255,0.14);
      animation: spinOrbit 70s linear infinite reverse;
    }
    .orbit-track-2::before {
      content: '';
      position: absolute;
      width: 7px; height: 7px;
      background: var(--violet);
      border-radius: 50%;
      bottom: -3.5px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 12px 4px var(--glow-v);
    }

    @keyframes spinOrbit { to { transform: rotate(360deg); } }

    .logo-core {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(0,245,255,0.12), rgba(180,79,255,0.08), transparent 70%);
      border: 2px solid rgba(0,245,255,0.3);
      box-shadow:
        0 0 40px rgba(0,245,255,0.25),
        0 0 100px rgba(92,111,255,0.15),
        inset 0 0 40px rgba(0,245,255,0.06);
      overflow: hidden;
      animation: logoPulse 4s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-core img {
      width: 72%;
      height: 72%;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(0,245,255,0.6));
      animation: logoFloat 6s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 40px rgba(0,245,255,0.25), 0 0 100px rgba(92,111,255,0.15), inset 0 0 40px rgba(0,245,255,0.06); }
      50%      { box-shadow: 0 0 70px rgba(0,245,255,0.45), 0 0 140px rgba(180,79,255,0.25), inset 0 0 60px rgba(0,245,255,0.12); }
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    /* ─── HEADING ─── */
    .brand-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--indigo) 45%, var(--violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.35));
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.4s forwards;
      margin-bottom: 0.6rem;
    }

    .motto {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.6rem, 2vw, 0.82rem);
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.6s forwards;
      margin-bottom: 1.2rem;
    }

    .tagline {
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 600;
      color: rgba(255,255,255,0.82);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.8s forwards;
      margin-bottom: 0.5rem;
    }

    .tagline span {
      background: linear-gradient(90deg, var(--gold), #ff9f43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── PILL STATS ─── */
    .stats-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1.4rem 0;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 1s forwards;
    }
    .stat-pill {
      padding: 6px 16px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
    }
    .stat-pill strong {
      color: var(--cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
    }

    /* ─── CTA BUTTON ─── */
    .cta-wrapper {
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 1.2s forwards;
      margin-top: 0.5rem;
    }

    .enter-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 52px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 3px;
      text-decoration: none;
      color: #fff;
      border-radius: 60px;
      background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(180,79,255,0.15));
      border: 1.5px solid rgba(0,245,255,0.4);
      backdrop-filter: blur(16px);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s ease, border-color 0.3s;
      cursor: none;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan), var(--indigo), var(--violet));
      opacity: 0;
      transition: opacity 0.35s ease;
      border-radius: inherit;
    }
    .enter-btn:hover::before { opacity: 1; }
    .enter-btn:hover {
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 20px 60px rgba(0,245,255,0.35), 0 0 100px rgba(180,79,255,0.2);
      border-color: transparent;
    }
    .enter-btn span { position: relative; z-index: 1; }
    .enter-btn .arrow {
      position: relative;
      z-index: 1;
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }
    .enter-btn:hover .arrow { transform: translateX(6px); }

    /* ─── BOTTOM HINT ─── */
    .scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }
    .scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .scroll-dot {
      width: 5px; height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      animation: bounce 1.6s ease-in-out infinite;
      box-shadow: 0 0 8px var(--cyan);
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 1; }
      50%      { transform: translateY(8px); opacity: 0.3; }
    }

    /* ─── KEYFRAMES ─── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ─── MOBILE ─── */
    @media (max-height: 700px) {
      .logo-system { width: 150px; height: 150px; margin-bottom: 1.5rem; }
      .orbit-track { inset: -28px; }
      .orbit-track-2 { inset: -50px; }
      .stats-row { margin: 0.8rem 0; }
    }
    @media (max-width: 480px) {
      .logo-system { width: 155px; height: 155px; }
      .orbit-track { inset: -28px; }
      .orbit-track-2 { inset: -48px; }
      .enter-btn { padding: 15px 36px; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<!-- Space Canvas -->
<canvas id="space-canvas"></canvas>

<!-- Nebula blobs -->
<div class="nebula">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Grid -->
<div class="grid-overlay"></div>

<!-- Main -->
<main class="scene">
  <div class="logo-system">
    <div class="orbit-track"></div>
    <div class="orbit-track-2"></div>
    <div class="logo-core">
      <img src="logo.png" alt="ClassSphere Logo">
    </div>
  </div>

  <h1 class="brand-name">ClassSphere</h1>
  <p class="motto">Learn &nbsp;·&nbsp; Compete &nbsp;·&nbsp; Grow &nbsp;·&nbsp; Succeed</p>
  <p class="tagline">Your <span>Learning Universe</span> Awaits</p>

  <div class="stats-row">
    <div class="stat-pill"><strong>∞</strong> &nbsp;Knowledge</div>
    <div class="stat-pill"><strong>3</strong> &nbsp;Roles</div>
    <div class="stat-pill"><strong>360°</strong> &nbsp;Insights</div>
    <div class="stat-pill"><strong>Real-time</strong> &nbsp;Sync</div>
  </div>

  <div class="cta-wrapper">
    <a href="login.html" class="enter-btn">
      <span>ENTER THE UNIVERSE</span>
      <span class="arrow">→</span>
    </a>
  </div>
</main>

<div class="scroll-hint">
  <span>Begin</span>
  <div class="scroll-dot"></div>
</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  window.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('grow'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('grow'));
  });

  // ─── CANVAS: Stars + Meteors + Shooting Stars ───
  const canvas = document.getElementById('space-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Stars
  const STAR_COUNT = 320;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    alpha: Math.random() * 0.6 + 0.2,
    speed: Math.random() * 0.003 + 0.001,
    phase: Math.random() * Math.PI * 2,
  }));

  // Shooting stars / meteors
  const meteors = [];
  function spawnMeteor() {
    const angle = Math.PI / 5 + Math.random() * (Math.PI / 8);
    meteors.push({
      x: Math.random() * canvas.width * 1.2 - canvas.width * 0.1,
      y: -30,
      vx: Math.cos(angle) * (6 + Math.random() * 7),
      vy: Math.sin(angle) * (6 + Math.random() * 7),
      len: 90 + Math.random() * 140,
      alpha: 1,
      width: 1.5 + Math.random() * 1.5,
      color: Math.random() > 0.5 ? '#00f5ff' : '#b44fff',
      life: 0,
      maxLife: 55 + Math.random() * 30,
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    // Twinkling stars
    stars.forEach(s => {
      s.phase += s.speed;
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fill();
    });

    // Spawn meteor
    if (frame % 90 === 0) spawnMeteor();

    // Draw meteors
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx; m.y += m.vy; m.life++;
      const progress = m.life / m.maxLife;
      const a = progress < 0.5 ? progress * 2 : (1 - progress) * 2;
      const grad = ctx.createLinearGradient(
        m.x, m.y,
        m.x - m.vx / Math.hypot(m.vx, m.vy) * m.len,
        m.y - m.vy / Math.hypot(m.vx, m.vy) * m.len
      );
      grad.addColorStop(0, m.color.replace(')', `,${a})`).replace('rgb', 'rgba'));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(
        m.x - m.vx / Math.hypot(m.vx, m.vy) * m.len,
        m.y - m.vy / Math.hypot(m.vx, m.vy) * m.len
      );
      ctx.strokeStyle = grad;
      ctx.lineWidth = m.width * (1 - progress * 0.5);
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Head glow
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.width * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = m.color.replace(')', `,${a * 0.9})`).replace('rgb', 'rgba');
      ctx.shadowColor = m.color;
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;

      if (m.life >= m.maxLife) meteors.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
